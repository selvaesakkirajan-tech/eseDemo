trigger:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - apps/python-api/**
      - infra/**
      - manifests/**

variables:
  # Link the variable group from Library
  - group: azure-cicd

  # Pipeline-level variables
  - name: DOCKER_IMAGE_NAME
    value: python-api
  - name: HELM_VERSION
    value: '3.12.0'
  - name: TERRAFORM_VERSION
    value: '1.5.0'

stages:
  - stage: Build
    displayName: 'Build & Test'
    jobs:
      - job: BuildAndTest
        displayName: 'Build Docker Image & Run Tests'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self

          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.11'
            displayName: 'Set Python version to 3.11'

          - task: Bash@3
            displayName: 'Install dependencies'
            inputs:
              targetType: 'inline'
              script: |
                cd apps/python-api
                pip install --upgrade pip
                pip install -r src/requirements.txt

          - task: Bash@3
            displayName: 'Run unit tests with coverage'
            inputs:
              targetType: 'inline'
              script: |
                cd apps/python-api
                python -m pytest tests/ -v --junitxml=junit.xml --cov=src --cov-report=xml --cov-report=html

          - task: PublishTestResults@2
            displayName: 'Publish test results'
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: 'apps/python-api/junit.xml'
              testRunTitle: 'API Unit Tests'
            condition: always()

          - task: PublishCodeCoverageResults@2
            displayName: 'Publish code coverage'
            inputs:
              summaryFileLocation: 'apps/python-api/coverage.xml'
            condition: always()

          - task: Docker@2
            displayName: 'Build Docker image'
            inputs:
              command: 'build'
              containerRegistry: 'acr-connection'
              Dockerfile: 'apps/python-api/Dockerfile'
              repository: '$(DOCKER_IMAGE_NAME)'
              tags: |
                $(Build.BuildId)
                latest
              arguments: '--no-cache'

          - task: Docker@2
            displayName: 'Push Docker image to ACR'
            inputs:
              command: 'push'
              containerRegistry: 'acr-connection'
              repository: '$(DOCKER_IMAGE_NAME)'
              tags: |
                $(Build.BuildId)
                latest

  - stage: Deploy
    displayName: 'Deploy to AKS (Dev)'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: ProvisionInfra
        displayName: 'Provision Infrastructure with Terraform'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self

          - task: Bash@3
            displayName: 'Install Terraform'
            inputs:
              targetType: 'inline'
              script: |
                TERRAFORM_VERSION="$(TERRAFORM_VERSION)"
                wget -q "https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/terraform_${TERRAFORM_VERSION}_linux_amd64.zip"
                unzip -o "terraform_${TERRAFORM_VERSION}_linux_amd64.zip"
                sudo mv terraform /usr/local/bin/
                terraform --version

          - task: AzureCLI@2
            displayName: 'Terraform Init'
            inputs:
              azureSubscription: 'azure-connection'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              addSpnToEnvironment: true
              workingDirectory: '$(Build.SourcesDirectory)/infra'
              inlineScript: |
                export ARM_CLIENT_ID=$servicePrincipalId
                export ARM_CLIENT_SECRET=$servicePrincipalKey
                export ARM_TENANT_ID=$tenantId
                export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)
                terraform init \
                  -backend-config="resource_group_name=$(TF_STATE_RG)" \
                  -backend-config="storage_account_name=$(TF_STATE_STORAGE)" \
                  -backend-config="container_name=tfstate" \
                  -backend-config="key=dev.tfstate"

                terraform validate

          - task: AzureCLI@2
            displayName: 'Recover soft-deleted Key Vault (if any)'
            inputs:
              azureSubscription: 'azure-connection'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              addSpnToEnvironment: true
              inlineScript: |
                # Azure soft-delete keeps a deleted vault's name reserved.
                # If a vault with our expected name exists in soft-deleted state,
                # recover it so Terraform can re-use it without a name conflict.
                KV_NAME="dev-esedemo-kv"
                SUBSCRIPTION_ID=$(az account show --query id -o tsv)

                DELETED=$(az keyvault list-deleted \
                  --subscription "$SUBSCRIPTION_ID" \
                  --query "[?name=='$KV_NAME'].name" \
                  -o tsv 2>/dev/null || true)

                if [ -n "$DELETED" ]; then
                  echo "Found soft-deleted Key Vault: $KV_NAME. Recovering..."
                  az keyvault recover --name "$KV_NAME" --subscription "$SUBSCRIPTION_ID"
                  echo "Recovery initiated. Waiting 30 s for DNS to populate..."
                  sleep 30
                else
                  echo "No soft-deleted Key Vault found — nothing to recover."
                fi

          - task: AzureCLI@2
            displayName: 'Terraform Plan'
            inputs:
              azureSubscription: 'azure-connection'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              addSpnToEnvironment: true
              workingDirectory: '$(Build.SourcesDirectory)/infra'
              inlineScript: |
                export ARM_CLIENT_ID=$servicePrincipalId
                export ARM_CLIENT_SECRET=$servicePrincipalKey
                export ARM_TENANT_ID=$tenantId
                export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)

                TFVARS_FILE="$(Build.SourcesDirectory)/infra/env/dev/terraform.tfvars"

                if [ ! -f "$TFVARS_FILE" ]; then
                  echo "##vso[task.logissue type=error]Missing tfvars file: $TFVARS_FILE"
                  echo "Contents of infra/env for debugging:"
                  ls -la "$(Build.SourcesDirectory)/infra/env" || true
                  exit 1
                fi

                # Import pre-existing Resource Group into Terraform state (idempotent)
                RG_NAME=$(terraform console -var-file="$TFVARS_FILE" <<< '"${var.environment}-${var.project}-rg"' | tr -d '"')
                RG_ID="/subscriptions/$ARM_SUBSCRIPTION_ID/resourceGroups/$RG_NAME"

                if az group show --name "$RG_NAME" >/dev/null 2>&1; then
                  if ! terraform state show azurerm_resource_group.main >/dev/null 2>&1; then
                    echo "Resource Group exists but is not in Terraform state. Importing: $RG_ID"
                    terraform import -var-file="$TFVARS_FILE" azurerm_resource_group.main "$RG_ID"
                  else
                    echo "Resource Group already present in Terraform state: $RG_NAME"
                  fi
                fi

                terraform plan -var-file="$TFVARS_FILE" -out=tfplan

          - task: AzureCLI@2
            displayName: 'Terraform Apply'
            name: TerraformApply
            inputs:
              azureSubscription: 'azure-connection'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              addSpnToEnvironment: true
              workingDirectory: '$(Build.SourcesDirectory)/infra'
              inlineScript: |
                export ARM_CLIENT_ID=$servicePrincipalId
                export ARM_CLIENT_SECRET=$servicePrincipalKey
                export ARM_TENANT_ID=$tenantId
                export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)

                terraform apply -auto-approve tfplan

                # Capture Cosmos DB outputs and pass them to downstream job
                COSMOS_ENDPOINT=$(terraform output -raw cosmos_endpoint)
                COSMOS_KEY=$(terraform output -raw cosmos_primary_key)
                KV_NAME=$(terraform output -raw key_vault_name)
                APPGW_ID=$(terraform output -raw appgw_id)
                APPGW_NAME=$(terraform output -raw appgw_name)
                APPGW_PUBLIC_IP=$(terraform output -raw appgw_public_ip)

                echo "##vso[task.setvariable variable=COSMOS_ENDPOINT;isOutput=true]$COSMOS_ENDPOINT"
                echo "##vso[task.setvariable variable=COSMOS_KEY;isOutput=true;issecret=true]$COSMOS_KEY"
                echo "##vso[task.setvariable variable=KV_NAME;isOutput=true]$KV_NAME"
                echo "##vso[task.setvariable variable=APPGW_ID;isOutput=true]$APPGW_ID"
                echo "##vso[task.setvariable variable=APPGW_NAME;isOutput=true]$APPGW_NAME"
                echo "##vso[task.setvariable variable=APPGW_PUBLIC_IP;isOutput=true]$APPGW_PUBLIC_IP"

          - task: AzureCLI@2
            displayName: 'Store pipeline secrets into Key Vault'
            inputs:
              azureSubscription: 'azure-connection'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                KV_NAME=$(TerraformApply.KV_NAME)

                # Store ACR credentials
                az keyvault secret set --vault-name "$KV_NAME" --name "ACR-USERNAME" --value "$(ACR_USERNAME)" --output none
                az keyvault secret set --vault-name "$KV_NAME" --name "ACR-PASSWORD" --value "$(ACR_PASSWORD)" --output none

                # Store Service Principal secret
                az keyvault secret set --vault-name "$KV_NAME" --name "AZURE-CLIENT-SECRET" --value "$(AZURE_CLIENT_SECRET)" --output none

                echo "Secrets stored in Key Vault: $KV_NAME"

      - job: DeployToAKS
        displayName: 'Deploy to AKS with Helm'
        dependsOn: ProvisionInfra
        pool:
          vmImage: 'ubuntu-latest'
        variables:
          COSMOS_ENDPOINT: $[ dependencies.ProvisionInfra.outputs['TerraformApply.COSMOS_ENDPOINT'] ]
          COSMOS_KEY: $[ dependencies.ProvisionInfra.outputs['TerraformApply.COSMOS_KEY'] ]
          KV_NAME: $[ dependencies.ProvisionInfra.outputs['TerraformApply.KV_NAME'] ]
          APPGW_ID: $[ dependencies.ProvisionInfra.outputs['TerraformApply.APPGW_ID'] ]
          APPGW_NAME: $[ dependencies.ProvisionInfra.outputs['TerraformApply.APPGW_NAME'] ]
          APPGW_PUBLIC_IP: $[ dependencies.ProvisionInfra.outputs['TerraformApply.APPGW_PUBLIC_IP'] ]
        steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: 'Wait for Key Vault DNS to resolve'
            inputs:
              azureSubscription: 'azure-connection'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                # Newly created (or recovered) vaults can take up to ~60 s to appear in DNS.
                # Poll until the vault's management endpoint responds, then continue.
                KV_NAME="$(KV_NAME)"
                if [ -z "$KV_NAME" ]; then
                  echo "##vso[task.logissue type=error]KV_NAME output variable is empty — Terraform Apply may have failed."
                  exit 1
                fi

                MAX_RETRIES=18   # 18 × 10 s = 3 minutes max
                SLEEP_SEC=10
                for i in $(seq 1 $MAX_RETRIES); do
                  STATUS=$(az keyvault show --name "$KV_NAME" --query "properties.provisioningState" -o tsv 2>/dev/null || echo "NOT_FOUND")
                  if [ "$STATUS" = "Succeeded" ]; then
                    echo "Key Vault '$KV_NAME' is ready (attempt $i)."
                    exit 0
                  fi
                  echo "Attempt $i/$MAX_RETRIES — vault status: '$STATUS'. Retrying in ${SLEEP_SEC}s..."
                  sleep $SLEEP_SEC
                done

                echo "##vso[task.logissue type=error]Key Vault '$KV_NAME' did not become ready within $(( MAX_RETRIES * SLEEP_SEC ))s."
                exit 1

          - task: AzureKeyVault@2
            displayName: 'Fetch secrets from Key Vault'
            inputs:
              azureSubscription: 'azure-connection'
              KeyVaultName: '$(KV_NAME)'
              SecretsFilter: 'ACR-USERNAME,ACR-PASSWORD,AZURE-CLIENT-SECRET,COSMOS-KEY,COSMOS-ENDPOINT,COSMOS-CONNECTION-STRING'
              RunAsPreJob: false
            # Secrets are now available as pipeline variables:
            # $(ACR-USERNAME), $(ACR-PASSWORD), $(AZURE-CLIENT-SECRET)
            # $(COSMOS-KEY), $(COSMOS-ENDPOINT), $(COSMOS-CONNECTION-STRING)

          - task: HelmInstaller@1
            displayName: 'Install Helm'
            inputs:
              helmVersionToInstall: '$(HELM_VERSION)'

          - task: AzureCLI@2
            displayName: 'Get AKS credentials'
            inputs:
              azureSubscription: 'azure-connection'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              addSpnToEnvironment: true
              inlineScript: |
                az aks get-credentials --resource-group $(AKS_RESOURCE_GROUP) --name $(AKS_CLUSTER_NAME) --overwrite-existing

          - task: AzureCLI@2
            displayName: 'Install AGIC (App Gateway Ingress Controller)'
            inputs:
              azureSubscription: 'azure-connection'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              addSpnToEnvironment: true
              inlineScript: |
                # Add AGIC Helm repo
                helm repo add application-gateway-kubernetes-ingress \
                  https://appgwingress.blob.core.windows.net/ingress-azure-helm-package/
                helm repo update

                SUBSCRIPTION_ID=$(az account show --query id -o tsv)

                # Install/upgrade AGIC Helm chart
                helm upgrade --install ingress-azure \
                  application-gateway-kubernetes-ingress/ingress-azure \
                  --namespace default \
                  --set appgw.name="$(APPGW_NAME)" \
                  --set appgw.resourceGroup="$(AKS_RESOURCE_GROUP)" \
                  --set appgw.subscriptionId="$SUBSCRIPTION_ID" \
                  --set appgw.shared=false \
                  --set armAuth.type=servicePrincipal \
                  --set armAuth.secretJSON="$(AZURE-CLIENT-SECRET)" \
                  --set rbac.enabled=true \
                  --wait --timeout 5m

                echo "AGIC installed. App Gateway: $(APPGW_NAME)"

          - task: AzureCLI@2
            displayName: 'Create ACR pull secret'
            inputs:
              azureSubscription: 'azure-connection'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              addSpnToEnvironment: true
              inlineScript: |
                # ACR creds now sourced from Key Vault (fetched above)
                kubectl create secret docker-registry acr-secret \
                  --docker-server=$(ACR_REGISTRY_URL) \
                  --docker-username="$(ACR-USERNAME)" \
                  --docker-password="$(ACR-PASSWORD)" \
                  --namespace=default \
                  --dry-run=client -o yaml | kubectl apply -f -

          - task: AzureCLI@2
            displayName: 'Create Cosmos DB secret'
            inputs:
              azureSubscription: 'azure-connection'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              addSpnToEnvironment: true
              inlineScript: |
                # Cosmos key sourced from Key Vault (fetched above)
                kubectl create secret generic cosmosdb-secret \
                  --from-literal=cosmos-key="$(COSMOS-KEY)" \
                  --namespace=default \
                  --dry-run=client -o yaml | kubectl apply -f -

          - task: AzureCLI@2
            displayName: 'Deploy Helm chart to AKS'
            inputs:
              azureSubscription: 'azure-connection'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              addSpnToEnvironment: true
              inlineScript: |
                helm upgrade \
                  --install python-api \
                  --namespace default \
                  --values manifests/helm/python-api/values.yaml \
                  --set image.repository="$(ACR_REGISTRY_URL)/$(DOCKER_IMAGE_NAME)" \
                  --set image.tag="$(Build.BuildId)" \
                  --set cosmosdb.endpoint="$(COSMOS-ENDPOINT)" \
                  manifests/helm/python-api

          - task: AzureCLI@2
            displayName: 'Verify Helm deployment'
            inputs:
              azureSubscription: 'azure-connection'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              addSpnToEnvironment: true
              inlineScript: |
                kubectl rollout status deployment/python-api -n default --timeout=5m
                echo "--- Pods ---"
                kubectl get pods -n default
                echo "--- Services ---"
                kubectl get svc -n default
                echo "--- Ingress ---"
                kubectl get ingress -n default
                echo ""
                echo "=================================================="
                echo "API is accessible via App Gateway public IP:"
                echo "  http://$(APPGW_PUBLIC_IP)/sum?a=5&b=3"
                echo "  curl -u kani:123 http://$(APPGW_PUBLIC_IP)/sum?a=5&b=3"
                echo "=========================================="