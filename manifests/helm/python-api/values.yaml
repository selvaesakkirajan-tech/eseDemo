replicaCount: 2

image:
  repository: <set-by-pipeline>
  tag: latest
  pullPolicy: IfNotPresent
  pullSecret: acr-secret

service:
  type: ClusterIP    # App Gateway (AGIC) handles external exposure - no LoadBalancer needed
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: "azure/application-gateway"
  annotations:
    kubernetes.io/ingress.class: "azure/application-gateway"
  # No host set - AGIC routes by path on the App Gateway public IP
  paths:
    - path: /
      pathType: Prefix

cosmosdb:
  endpoint: "<set-by-pipeline>"    # e.g. https://dev-esedemo-cosmos.documents.azure.com:443/
  database: "apidb"
  container: "users"
  # cosmos-key is injected via Kubernetes secret 'cosmosdb-secret' (created by pipeline)

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

livenessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 5

nodeSelector: {}

tolerations: []

affinity: {}


